name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        npm pkg delete scripts.preinstall
        npm install --legacy-peer-deps

    - name: Build Web App
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Install Cordova & Build APK
      run: |
        npm install -g cordova
        cordova create build-app com.rihad.browser BrowserApp
        cd build-app
        cordova platform add android
        rm -rf www/*
        cp -r ../dist/* www/ || cp -r ../build/* www/
        cordova build android --debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-browser-apk
        path: build-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk

